<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURKAB — Kalıp Takip Sistemi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'IBM Plex Sans', system-ui, sans-serif; 
            background: #f8f9fa; 
            color: #222; 
            line-height: 1.5;
        }
        .header { 
            background: #000; 
            color: #fff; 
            padding: 0 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }
        .header-inner { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 70px; 
        }
        .brand { font-size: 18px; font-weight: 800; color: #f5c400; letter-spacing: 1px; }
        .main { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        .section { 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.1); 
            margin-bottom: 25px; 
        }
        .section-head { 
            background: #1a1a1a; 
            color: white; 
            padding: 14px 20px; 
            font-weight: 600; 
            border-radius: 10px 10px 0 0; 
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; }
        th { background: #1a1a1a; color: white; }
        tr:hover { background: #f5f5f5; }
        .btn { 
            padding: 10px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
        }
        .btn-success { background: #f5c400; color: #1a1a1a; }
        .btn-primary { background: #1e3a8a; color: white; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand">BURKAB KALIP TAKİP SİSTEMİ</div>
            <button class="btn btn-success" onclick="yeniKalipModal()">
                <i class="fas fa-plus"></i> Yeni Kalıp
            </button>
        </div>
    </header>

    <div class="main">
        <div class="section">
            <div class="section-head">KALIP LİSTESİ</div>
            <div style="padding:20px;">
                <input type="text" id="arama" placeholder="Ara..." style="width:100%; padding:12px; margin-bottom:15px;" onkeyup="filtrele()">
                <table id="kalipTablo">
                    <thead><tr>
                        <th>Kalıp No</th>
                        <th>Tip</th>
                        <th>Adet</th>
                        <th>Konum</th>
                        <th>Son Bakım</th>
                        <th>İşlem</th>
                    </tr></thead>
                    <tbody id="tabloBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GS_URL = 'https://script.google.com/macros/s/AKfycby1Q9SiAHloAR_Y8tAe-o0ocDf_sUjoy3hWwKVWTHnhoMWq8TDdAzQTbwuR1cr3_JyguA/exec';
        let kaliplar = [];

        async function loadKaliplar() {
            const res = await fetch(GS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "getAll" }),
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await res.json();
            kaliplar = data.slice(1).map(r => ({
                no: r[0],
                tip: r[3],
                adet: r[2],
                konum: r[1],
                sonBakim: r[6] ? new Date(r[6]).toISOString().split('T')[0] : ''
            }));
            renderTablo(kaliplar);
        }

            document.getElementById('tabloBody').innerHTML = data.map(item => `
                <tr>
                    <td><strong>${item.no}</strong></td>
                    <td>${item
