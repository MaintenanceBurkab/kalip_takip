<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURKAB — Kalıp Takip Sistemi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'IBM Plex Sans', system-ui, sans-serif; 
            background: #f8f9fa; 
            color: #222; 
            font-size: 15px; 
        }
        .header { 
            background: #000000; 
            color: #fff; 
            padding: 0 20px; 
            position: sticky; 
            top: 0; 
            z-index: 200; 
            box-shadow: 0 3px 16px rgba(0,0,0,0.35); 
        }
        .header-inner { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 72px; 
            gap: 12px; 
        }
        .brand-title { 
            font-size: 18px; 
            font-weight: 800; 
            color: #f5c400; 
            letter-spacing: 1px; 
        }
        .main { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px 16px; 
        }
        .section { 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); 
            margin-bottom: 20px; 
            overflow: hidden; 
        }
        .section-head { 
            background: linear-gradient(90deg, #1a1a1a, #333); 
            color: white; 
            padding: 14px 20px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .btn { 
            padding: 10px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
        }
        .btn-primary { background: #1e3a8a; color: white; }
        .btn-success { background: #f5c400; color: #1a1a1a; font-weight: 700; }
        
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #1a1a1a; 
            color: white; 
            padding: 12px; 
            text-align: left; 
            font-size: 13px; 
        }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f8f9fa; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-title">BURKAB</div>
                <div>
                    <h1 style="font-size:17px;">KALIP TAKİP SİSTEMİ</h1>
                    <p style="font-size:11px; opacity:0.7;">Terminal Krimpleme Kalıpları</p>
                </div>
            </div>
            <button class="btn btn-success" onclick="yeniKalipModal()">
                <i class="fas fa-plus"></i> YENİ KALIP EKLE
            </button>
        </div>
    </header>

    <div class="main">
        <div class="section">
            <div class="section-head">
                <span class="dot"></span>
                KALIP LİSTESİ (135 ADET)
            </div>
            <div style="padding:15px;">
                <input type="text" id="arama" placeholder="Kalıp No veya Tip ara..." 
                       style="width:100%; padding:12px; border:1px solid #ddd; border-radius:6px; margin-bottom:15px;" 
                       onkeyup="filtrele()">
                
                <table id="kalipTablo">
                    <thead>
                        <tr>
                            <th>Kalıp No</th>
                            <th>Tip</th>
                            <th>Adet</th>
                            <th>Konum</th>
                            <th>Son Bakım</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="tabloBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GS_URL = 'https://script.google.com/macros/s/AKfycby1Q9SiAHloAR_Y8tAe-o0ocDf_sUjoy3hWwKVWTHnhoMWq8TDdAzQTbwuR1cr3_JyguA/exec';
        let kaliplar = [];

        async function loadKaliplar() {
            try {
                const res = await fetch(GS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getAll" }),
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await res.json();
                kaliplar = data.slice(1).map(r => ({
                    no: r[0] || '',
                    tip: r[3] || '',
                    adet: r[2] || '',
                    konum: r[1] || '',
                    sonBakim: r[6] ? new Date(r[6]).toISOString().split('T')[0] : ''
                }));
                renderTablo(kaliplar);
            } catch(e) {
                console.error(e);
            }
        }

        function renderTablo(data) {
            document.getElementById('tabloBody').innerHTML = data.map(k => `
                <tr>
                    <td><strong>${k.no}</strong></td>
                    <td>${k.tip}</td>
                    <td>${k.adet}</td>
                    <td>${k.konum}</td>
                    <td>${k.sonBakim}</td>
                    <td><button class="btn btn-primary">Detay</button></td>
                </tr>
            `).join('');
        }

        function filtrele() {
            const term = document.getElementById('arama').value.toLowerCase();
            const filtered = kaliplar.filter(k => 
                k.no.toLowerCase().includes(term) || k.tip.toLowerCase().includes(term)
            );
            renderTablo(filtered);
        }

        window.onload = loadKaliplar;
    </script>
</body>
</html>
